name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manual publish of every version node. Same Modrinth upload a `v*` tag would do.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 26.1+ builds on Java 25; the 1.20.5-1.21.x nodes on Java 21. Install both so the
      # Gradle toolchain resolves each node locally without downloading.
      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test every version node
        run: ./gradlew chiseledBuild

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: shulker-pocket
          path: versions/**/build/libs/*.jar

  publish:
    # Runs on a version tag (e.g. v0.3.0) or a manual workflow_dispatch; requires the
    # MODRINTH_TOKEN repo secret. Publishes every version node, each with its own gameVersions.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish every version node to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew chiseledPublishMods

      - name: Sync Modrinth project page (body from README)
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          jq -Rs '{body: .}' README.md > /tmp/body.json
          curl -sS -X PATCH \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/body.json \
            "https://api.modrinth.com/v2/project/hfBI4FCu"
