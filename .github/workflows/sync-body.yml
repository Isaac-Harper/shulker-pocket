name: sync-modrinth-body

# Re-syncs the Modrinth project page from README.md without uploading a version.
# Manual only; requires the MODRINTH_TOKEN repo secret.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Modrinth project page (body from README)
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          jq -Rs '{body: .}' README.md > /tmp/body.json
          curl -sS -X PATCH \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/body.json \
            "https://api.modrinth.com/v2/project/hfBI4FCu"
